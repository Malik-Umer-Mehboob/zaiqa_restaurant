name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: zaiqa_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations against test DB
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/zaiqa_db

      - name: Check server starts without crashing
        run: |
          node src/server.js &
          SERVER_PID=$!
          sleep 5
          kill $SERVER_PID
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/zaiqa_db
          JWT_SECRET: ci_test_secret
          PORT: 5000
          STRIPE_SECRET_KEY: sk_test_dummy_key_for_ci_only
          STRIPE_WEBHOOK_SECRET: whsec_dummy_key_for_ci_only
          CLOUDINARY_CLOUD_NAME: ci_dummy
          CLOUDINARY_API_KEY: ci_dummy
          CLOUDINARY_API_SECRET: ci_dummy

      # Uncomment once you add tests:
      # - name: Run tests
      #   run: npm test
      #   env:
      #     DATABASE_URL: postgresql://postgres:password@localhost:5432/zaiqa_db

  frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api
